name: Deploy

# 触发：push 到 master 自动部署；也可在 Actions 页面手动触发
on:
  push:
    branches: [master]
  workflow_dispatch:

# 同一分支新推送时取消进行中的旧部署
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDBASE_ENV_ID: dev-4gs517j09b896e44
  WX_APPID: wxc09ef68c8f4467ea

jobs:
  # ---------- 云函数：部署到 CloudBase ----------
  cloudfunctions:
    name: Deploy cloud functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # 增量部署要按 commit 范围 diff，需完整历史（浅克隆拿不到基准提交）
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install CloudBase CLI
        # 锁 2.6.16：3.x 改了鉴权方式；2.x 需显式 login，不会自动读环境变量
        run: npm install -g @cloudbase/cli@2.6.16

      - name: Deploy changed functions
        env:
          # CAM API 密钥（SecretId / SecretKey），在 GitHub Secrets 配置
          TC_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TC_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -e
          # 显式非交互登录（--apiKeyId=SecretId，--apiKey=SecretKey），否则会退回交互式扫码卡住
          cloudbase login --apiKeyId "$TC_SECRET_ID" --apiKey "$TC_SECRET_KEY"

          # ---- 决定部署哪些函数：默认增量，任何不确定的情况一律退回全量（宁可慢不可漏）----
          all_funcs() { for d in cloudfunctions/*/; do basename "$d"; done; }
          targets=""; reason=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            targets="$(all_funcs)"; reason="手动触发 → 全量（强制全量入口）"
          elif [ -z "$BEFORE_SHA" ] || echo "$BEFORE_SHA" | grep -qE '^0+$'; then
            targets="$(all_funcs)"; reason="无基准提交（分支新建/首推）→ 全量"
          elif ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            targets="$(all_funcs)"; reason="基准提交不可达（force-push?）→ 全量"
          else
            diff="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"
            if echo "$diff" | grep -qx 'cloudbaserc.json'; then
              # 函数配置（触发器/超时/内存…）变更影响面无法逐函数精确归属，保守全量
              targets="$(all_funcs)"; reason="cloudbaserc.json 变更（函数配置/触发器）→ 全量"
            else
              targets="$(echo "$diff" | grep -E '^cloudfunctions/[^/]+/' | cut -d/ -f2 | sort -u)"
              reason="增量：仅部署本次改动的函数"
            fi
          fi

          echo "::notice::部署策略：$reason"
          if [ -z "$targets" ]; then
            echo "本次无云函数改动，跳过部署。"
            exit 0
          fi
          echo "待部署函数："; echo "$targets" | sed 's/^/  - /'

          # ---- 逐个部署，每个重试 3 次；单个失败不中止整批，最后统一汇总 ----
          # 重试是为缓解 CloudBase 偶发瞬时失败（如 BatchCreateTrigger "请稍后重试"）
          failed=""
          for name in $targets; do
            echo "::group::deploy $name"
            ok=""
            for attempt in 1 2 3; do
              if tcb fn deploy "$name" -e "$CLOUDBASE_ENV_ID" --force; then ok=1; break; fi
              echo "deploy $name 第 $attempt 次失败，10s 后重试…"
              sleep 10
            done
            [ -z "$ok" ] && failed="$failed $name"
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then
            echo "::error::以下函数最终部署失败:$failed"
            exit 1
          fi

  # ---------- 小程序：构建并上传体验版 ----------
  miniprogram:
    name: Build & upload miniprogram
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build weapp
        run: pnpm build:weapp

      - name: Write WeChat upload key
        env:
          WX_PRIVATE_KEY: ${{ secrets.WX_PRIVATE_KEY }}
        run: printf '%s' "$WX_PRIVATE_KEY" > "$RUNNER_TEMP/wx_private.key"

      - name: Upload trial version
        # 用 miniprogram-ci 的 CLI 上传体验版（robot 1）。版本号 1.1.<run_number>：
        # 用 1.1.x 而非 1.0.x，是为了恒高于历史手动包（最高到 1.0.6），避免重号、保证单调递增。
        run: |
          npx --yes miniprogram-ci@latest upload \
            --pp "$GITHUB_WORKSPACE" \
            --pkp "$RUNNER_TEMP/wx_private.key" \
            --appid "$WX_APPID" \
            --uv "1.1.${{ github.run_number }}" \
            --ud "CI ${GITHUB_SHA::7} by ${{ github.actor }}" \
            -r 1 \
            --enable-es6 true
