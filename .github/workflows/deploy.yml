name: Deploy

# 触发：push 到 master 自动部署；也可在 Actions 页面手动触发
on:
  push:
    branches: [master]
  workflow_dispatch:

# 同一分支新推送时取消进行中的旧部署
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDBASE_ENV_ID: dev-4gs517j09b896e44
  WX_APPID: wxc09ef68c8f4467ea

jobs:
  # ---------- 云函数：部署到 CloudBase ----------
  cloudfunctions:
    name: Deploy cloud functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install CloudBase CLI
        # 锁 2.6.16：3.x 改了鉴权方式；2.x 需显式 login，不会自动读环境变量
        run: npm install -g @cloudbase/cli@2.6.16

      - name: Deploy all functions
        env:
          # CAM API 密钥（SecretId / SecretKey），在 GitHub Secrets 配置
          TC_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TC_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: |
          set -e
          # 显式非交互登录（--apiKeyId=SecretId，--apiKey=SecretKey），否则会退回交互式扫码卡住
          cloudbase login --apiKeyId "$TC_SECRET_ID" --apiKey "$TC_SECRET_KEY"
          # 每个函数重试 3 次：CloudBase 触发器创建偶发 BatchCreateTrigger 瞬时失败（官方提示"请稍后重试"）
          # 单个函数失败不中止整批，最后统一汇总失败项
          failed=""
          for dir in cloudfunctions/*/; do
            name="$(basename "$dir")"
            echo "::group::deploy $name"
            ok=""
            for attempt in 1 2 3; do
              if tcb fn deploy "$name" -e "$CLOUDBASE_ENV_ID" --force; then ok=1; break; fi
              echo "deploy $name 第 $attempt 次失败，10s 后重试…"
              sleep 10
            done
            [ -z "$ok" ] && failed="$failed $name"
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then
            echo "::error::以下函数最终部署失败:$failed"
            exit 1
          fi

  # ---------- 小程序：构建并上传体验版 ----------
  miniprogram:
    name: Build & upload miniprogram
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build weapp
        run: pnpm build:weapp

      - name: Write WeChat upload key
        env:
          WX_PRIVATE_KEY: ${{ secrets.WX_PRIVATE_KEY }}
        run: printf '%s' "$WX_PRIVATE_KEY" > "$RUNNER_TEMP/wx_private.key"

      - name: Upload trial version
        # 用 miniprogram-ci 的 CLI 上传体验版（robot 1）。版本号用 run_number 递增。
        run: |
          npx --yes miniprogram-ci@latest upload \
            --pp "$GITHUB_WORKSPACE" \
            --pkp "$RUNNER_TEMP/wx_private.key" \
            --appid "$WX_APPID" \
            --uv "1.0.${{ github.run_number }}" \
            --ud "CI ${GITHUB_SHA::7} by ${{ github.actor }}" \
            -r 1 \
            --enable-es6 true
